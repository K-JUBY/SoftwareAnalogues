user.authenticate=SELECT user_id, username, display_name, is_active, created_at, last_login_at FROM software_app.authenticate_user(?, ?)
session.setCurrentUser=SELECT set_config('app.user_id', ?, false)
category.findAll=SELECT * FROM software_app.get_categories_with_locale(?)
developer.findAll=SELECT developer_id, name, website FROM software_app.developers ORDER BY name
software.search=SELECT * FROM software_app.search_software(?, ?, ?, ?, ?)
software.create=SELECT software_app.add_software(?, ?, ?, ?, ?, ?, ?, ?)
software.update=SELECT software_app.update_software(?, ?, ?, ?, ?, ?, ?, ?, ?)
software.delete=SELECT software_app.delete_software(?)
review.findBySoftware=SELECT * FROM software_app.list_reviews(?)
review.create=SELECT software_app.add_review(?, ?, ?)
analog.findBySoftware=SELECT * FROM software_app.list_software_analogs(?)
analog.add=CALL software_app.add_software_analog(?, ?, ?, ?)
analog.remove=SELECT software_app.remove_software_analog(?, ?)
collection.findCurrentUser=SELECT * FROM software_app.list_collections()
collection.create=SELECT software_app.create_collection(?, ?)
collection.delete=SELECT software_app.delete_collection(?)
collection.items=SELECT * FROM software_app.list_collection_items(?)
collection.item.add=SELECT software_app.add_collection_item(?, ?, ?, ?)
collection.item.remove=SELECT software_app.remove_collection_item(?, ?)
category.getCategoryCounts=SELECT COALESCE(ct.name, c.name) AS category_name, COUNT(s.software_id) AS software_count FROM software_app.categories c LEFT JOIN software_app.category_translations ct ON ct.category_id = c.category_id AND ct.locale = ? LEFT JOIN software_app.software s ON s.category_id = c.category_id GROUP BY c.category_id, COALESCE(ct.name, c.name) ORDER BY category_name

